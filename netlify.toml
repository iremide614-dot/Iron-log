# Netlify build config for the RECOMP Next.js app.
# The Next.js Runtime plugin turns app/api/* into serverless functions
# (so the Gemini key stays server-side) and handles SSR + static assets.

[build]
  command = "npm run build"

# Next.js 16 needs Node 20+. The old static site may default to an older
# version, which would fail the build — pin a supported one.
[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
